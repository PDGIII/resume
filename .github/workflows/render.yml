name: Render Resume and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "Philip_Greco_CV.yaml"
      - ".github/workflows/render.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  render-and-deploy:
    runs-on: homelab-k8s-resume
    container:
      image: python:3.12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install rendercv
        run: pip install "rendercv[full]"

      - name: Render CV
        run: rendercv render Philip_Greco_CV.yaml

      - name: Prepare output directory
        run: |
          find rendercv_output -type f
          mkdir -p gh-pages
          find rendercv_output -name "*.pdf" -exec cp {} gh-pages/resume.pdf \;
          echo '<meta http-equiv="refresh" content="0; url=resume.pdf">' > gh-pages/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "deploy: render ${{ github.sha }}"
