cv:
  name: Philip Greco, III
  location: Tampa, FL
  email: philip.d.greco@gmail.com
  website: https://philipgreco.com
  social_networks:
    - network: LinkedIn
      username: philip-greco
    - network: GitHub
      username: PDGIII

  sections:
    summary:
      - DevOps Engineer who designs, automates, and operates large-scale
        infrastructure across bare-metal Kubernetes and AWS EKS. Focused on
        container orchestration, infrastructure-as-code, CI/CD, secrets
        management, and observability.

    experience:
      - company: Sangoma
        position: Sr. DevOps Engineer
        location: Tampa, FL
        start_date: 2025-07
        end_date: present
        highlights:
          - Operated a UCaaS platform across bare-metal Kubernetes and AWS EKS,
            supporting VoIP services including Asterisk, SIP, RTP proxy, and presence.
          - Migrated all manually-managed workloads to Helm and Helmfile, authoring
            custom charts and a context guard to prevent accidental cross-cluster deployments.
          - Led CNI migration to Calico via the Tigera Operator; managed Multus and
            Whereabouts for multi-network pods.
          - Deployed Istio service mesh across clusters, configuring PodDisruptionBudgets,
            traffic policies, and autoscaling.
          - Provisioned AWS EKS clusters with Terraform and Terragrunt, including EFS
            storage migration, AWS Load Balancer Controller, pod identity for IAM, and
            VPC security groups.
          - Deployed HashiCorp Vault on AWS and integrated External Secrets Operator
            across all environments, eliminating hardcoded secrets from Git.
          - Built an observability stack on EKS with Prometheus, Grafana, Loki, and Alloy,
            using daemonset and sidecar logging patterns.
          - Automated Kubernetes upgrades across clusters through v1.33 via Ansible
            playbooks with pod health checks, DNS validation, and controlled rolling upgrades.

      - company: Sangoma
        position: DevOps Engineer
        location: Atlanta, GA
        start_date: 2021-01
        end_date: 2025-07
        highlights:
          - Provisioned bare-metal Dell blade infrastructure via PXE boot with Debian
            preseed automation, handling network configuration and OS deployment.
          - Authored Ansible roles to compile and deploy FreeSWITCH from source, managing
            version pinning, Sofia-SIP patches, and debug symbol builds.
          - Managed SIP and global load balancer fleets via Ansible, maintaining version
            consistency and availability in production.
          - Maintained the UCaaS platform, performing root cause analysis on issues
            escalated by Tier 3 Support.
          - Built internal Bash and SQL tooling to streamline diagnostics and reduce
            mean time to resolution.

      - company: Star2Star Communications
        position: Lead Tier 3 Technician
        location: Atlanta, GA
        start_date: 2016-01
        end_date: 2021-01
        highlights:
          - Diagnosed and resolved complex SIP/VoIP issues using Wireshark packet
            analysis, filing detailed bug reports with captures and reproduction steps.
          - Correlated customer logs and packet captures to identify platform-wide SIP
            issues, escalating to development and DevOps teams.
          - Authored technical documentation and Standard Operating Procedures to improve
            consistency across the support organization.
          - Mentored junior technicians on SIP troubleshooting and diagnostic tooling.

    projects:
      - name: Self-Hosted Kubernetes Homelab
        highlights:
          - Designed and operated a bare-metal Kubernetes cluster managed entirely through
            Helmfile with declarative, dependency-ordered releases.
          - Integrated HashiCorp Vault with External Secrets Operator via Kubernetes auth
            for dynamic secret injection without storing credentials in Git.
          - Deployed the Tailscale operator with custom ingress for zero-config HTTPS
            access to internal services without exposing public ports.
          - Built an observability stack with Prometheus, Grafana, Loki, Alloy, and
            Alertmanager for metrics, logs, and alerting.
          - Provisioned Longhorn distributed block storage for stateful workloads and
            MetalLB for bare-metal load balancing.
          - Automated CI/CD with GitHub Actions and self-hosted ARC runner scale sets,
            publishing images to GHCR and deploying via Helm.

      - name: Self-Hosted LLM Inference & AI Automation
        highlights:
          - Self-hosted Ollama on Kubernetes for fully local LLM inference, keeping all
            data on-premises with no external AI APIs.
          - Built a RAG pipeline using ChromaDB and Ollama-generated embeddings for
            semantic search over historical articles, injecting context into prompts.
          - Deployed as a Kubernetes CronJob with scheduling jitter, concurrency controls,
            and credentials pulled from Vault via External Secrets Operator.


    education:
      - institution: Southern New Hampshire University
        area: Information Technology
        degree: BS
        location: Manchester, NH
        start_date: 2013-01
        end_date: 2017-01
        highlights:
          - "Concentration: Networking & Telecommunications"

      - institution: NHTI, Concord's Community College
        area: Information Technology
        degree: AS
        location: Concord, NH
        start_date: 2011-01
        end_date: 2013-01

    skills:
      - label: Container & Orchestration
        details: Kubernetes, Docker, EKS, Helm, Helmfile
      - label: Infrastructure as Code
        details: Terraform, Terragrunt, Ansible
      - label: CI/CD
        details: GitHub Actions, Actions Runner Controller (ARC), GHCR
      - label: Secrets & Security
        details: HashiCorp Vault, External Secrets Operator, Kubernetes RBAC, Tailscale
      - label: Networking & Ingress
        details: Traefik, MetalLB, NGINX, Wireguard, VoIP, TCP/IP, DNS
      - label: Observability
        details: Prometheus, Grafana, Loki, Alloy, Alertmanager
      - label: Storage
        details: Longhorn, AWS EFS, S3
      - label: Cloud & OS
        details: AWS, Digital Ocean, Linux (Ubuntu, Debian)
      - label: AI & LLM
        details: Ollama, ChromaDB, RAG
      - label: Languages
        details: Bash, Python

